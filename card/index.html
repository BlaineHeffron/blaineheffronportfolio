<body>
  <main class="page">
    <section class="shell">
      <section class="hero">
        <img class="logo" src="/assets/media/icon.png" alt="Blaine Heffron logo">
        <p class="eyebrow">Blaine Heffron Consulting</p>
        <h1>Practical automation for business operations.</h1>
        <p class="lede">Send a quick note about the workflow you want cleaned up.</p>

        <div class="quick-actions">
          <a href="tel:8434528866">Call 843-452-8866</a>
          <a href="mailto:blaine@blaineheffron.com?subject=Business%20card%20inquiry">Email directly</a>
        </div>
      </section>

      <form class="card-form" action="https://formspree.io/f/xdoqagnv" method="POST">
        <input type="hidden" name="source" value="business-card">

        <label for="name">Name</label>
        <input type="text" id="name" name="name" required autocomplete="name">

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">

        <label for="message">What feels manual or messy?</label>
        <textarea id="message" name="message" required placeholder="Lead follow-up, onboarding, reporting, scheduling, internal ops, data cleanup..."></textarea>

        <button type="submit">Request a Call</button>
      </form>
    </section>
  </main>
</body>
